name: ACCDM-2 Alert

on:
  schedule:
    # MERCREDI 22h UTC — APRES la close US (21h UTC en hiver, 20h UTC en ete)
    # Yahoo a la close validee du mercredi → filtre 15j calcule sur les memes
    # prix que ceux du backtest (close mercredi).
    # En FR : 23h hiver / minuit ete. Email recu pour ordre execute jeudi.
    - cron: '0 22 * * 3'
    # JOURS 28-31 OUVRES 22h UTC — APRES la close US
    # Le script verifie via is_today_monthly_signal_day si c'est bien le
    # dernier jour ouvre du mois. Sinon exit 0.
    - cron: '0 22 28-31 * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcer envoi meme si pas jour de signal'
        required: false
        default: 'false'

jobs:
  send-alert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install sendgrid
      
      - name: Download latest data
        run: python3 scripts/download_data.py
      
      - name: Send alert email
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ALERT_RECIPIENTS_PERSONNEL: ${{ secrets.ALERT_RECIPIENTS_PERSONNEL }}
          CAPITAL_REEL_EUR: ${{ secrets.CAPITAL_REEL_EUR }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python3 scripts/alert_email.py --force
          else
            python3 scripts/alert_email.py
          fi
